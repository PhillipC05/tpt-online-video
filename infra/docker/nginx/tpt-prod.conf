server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript video/mp2t;
    gzip_min_length 256;
    gzip_proxied any;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # Static assets with content hash — long cache
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API proxy
    location /api/ {
        proxy_pass http://tpt-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz {
        proxy_pass http://tpt-api:8080;
        proxy_http_version 1.1;
    }

    location /readyz {
        proxy_pass http://tpt-api:8080;
        proxy_http_version 1.1;
    }

    # WebSocket for chat
    location /ws/ {
        proxy_pass http://tpt-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # HLS segments — longer cache
    location /hls/ {
        proxy_pass http://mediamtx:8888;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
    }
}