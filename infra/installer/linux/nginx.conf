# TPT Online Video — Nginx site configuration
# Installed to /etc/nginx/conf.d/tpt.conf
# Serves the SPA frontend and reverse-proxies the API + live streams.

proxy_cache_path /opt/tpt/data/nginx-cache
    levels=1:2
    keys_zone=tpt_media:32m
    max_size=10g
    inactive=7d
    use_temp_path=off;

upstream tpt_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream tpt_hls {
    server 127.0.0.1:8888;
    keepalive 16;
}

upstream tpt_webrtc {
    server 127.0.0.1:8889;
    keepalive 8;
}

server {
    listen 80 default_server;
    server_name _;

    # Frontend static assets
    root /opt/tpt/web;
    index index.html;

    # SPA fallback — unknown paths render index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy — pass everything under /api/ to tpt-api
    location /api/ {
        proxy_pass         http://tpt_api/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 5G;
    }

    # HLS live streams with cache layer
    location /hls/ {
        proxy_pass             http://tpt_hls/;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_cache            tpt_media;
        proxy_cache_valid      200 5s;
        proxy_cache_valid      404 1s;
        proxy_cache_lock       on;
        proxy_cache_use_stale  updating;
        add_header             X-Cache-Status $upstream_cache_status;
    }

    # WebRTC WHEP/WHIP endpoints
    location /webrtc/ {
        proxy_pass         http://tpt_webrtc/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Healthz pass-through (used by healthcheck.sh)
    location = /healthz {
        proxy_pass http://tpt_api/healthz;
    }

    # Upload size limit for video files
    client_max_body_size 5G;
}

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}
