# TPT Online Video — Redis configuration
# Installed to /opt/tpt/config/redis.conf

bind 127.0.0.1
port 6379
protected-mode yes

# Persistence
dir /opt/tpt/data/redis
dbfilename dump.rdb
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice

# Memory limit — adjust for available RAM
maxmemory 512mb
maxmemory-policy allkeys-lru

# Redis Streams for job queues — keep stream entries within bounds
stream-node-max-bytes 4096
stream-node-max-entries 100
